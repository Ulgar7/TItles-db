<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>TItle-db</title>
</head>
<body>
    <h1>Buscador de peliculas</h1>
    
    <form id="search-form">
        <input type="text"
        id="search-input"
        placeholder="Buscar película..."
        autocomplete="off">
        <button class="btnSubmit" type="submit">Buscar</button>
    </form>
    <div id="status"></div>
    <div class="layout">
        <aside id="filters">
            <button data-type="all">Todos</button>
            <button data-type="movie">Películas</button>
            <button data-type="series">Series</button>
        </aside>
        <main id="results"></main>
    </div>
    <!-- <div id="filters">
        <button data-type="all">Todos</button>
        <button data-type="movie">Películas</button>
        <button data-type="series">Series</button>
    </div> -->


    <!-- <div id="results"></div> -->

    <script type="module" src="./js/main.js"></script>
</body>
</html>
